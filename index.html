<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sincronário 13:20</title>
<meta name="description" content="Sincronário 13 Luas e Tzolkin: kin do dia, oráculo, onda encantada, calculadora de kin de nascimento.">
<meta name="theme-color" content="#0b0e1a">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Figtree:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b0e1a; --bg2:#131a2e; --panel:#161d33cc; --panel2:#1b2440;
  --line:#2a3555; --ink:#e9e6da; --ink-dim:#9aa3c0;
  --gold:#e8b84b; --gold-dim:#c49a3a;
  --red:#e05252; --white:#efe9dc; --blue:#5b95e6; --yellow:#eec84f; --green:#5fc08b;
  --radius:18px;
  --font-display:"Cinzel",serif; --font-body:"Figtree",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-body); background:var(--bg); color:var(--ink);
  min-height:100dvh; padding-bottom:calc(76px + env(safe-area-inset-bottom));
  background-image:
    radial-gradient(1.4px 1.4px at 12% 18%, #ffffffb0 50%, transparent 51%),
    radial-gradient(1px 1px at 70% 8%, #ffffff80 50%, transparent 51%),
    radial-gradient(1.6px 1.6px at 88% 30%, #ffd98a99 50%, transparent 51%),
    radial-gradient(1px 1px at 32% 44%, #ffffff66 50%, transparent 51%),
    radial-gradient(1.3px 1.3px at 54% 24%, #ffffff90 50%, transparent 51%),
    radial-gradient(1px 1px at 8% 66%, #ffffff70 50%, transparent 51%),
    radial-gradient(1.5px 1.5px at 78% 58%, #ffffff85 50%, transparent 51%),
    radial-gradient(1px 1px at 44% 80%, #ffd98a80 50%, transparent 51%),
    radial-gradient(1.2px 1.2px at 92% 84%, #ffffff70 50%, transparent 51%),
    radial-gradient(1px 1px at 20% 92%, #ffffff60 50%, transparent 51%),
    radial-gradient(ellipse 120% 70% at 50% -10%, #1d2a52 0%, transparent 60%),
    radial-gradient(ellipse 90% 60% at 80% 110%, #241a3d 0%, transparent 60%);
  background-attachment:fixed;
}
header.app{
  position:sticky;top:0;z-index:30;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  background:linear-gradient(180deg,#0b0e1af2,#0b0e1acc);
  border-bottom:1px solid #232c4a;
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
header.app h1{
  font-family:var(--font-display);font-size:1.05rem;font-weight:600;letter-spacing:.14em;
  color:var(--gold);text-transform:uppercase;white-space:nowrap;
}
header.app .greg{font-size:.8rem;color:var(--ink-dim);text-align:right;line-height:1.25}
main{max-width:980px;margin:0 auto;padding:16px 14px 30px}
.view{display:none;animation:fadeUp .35s ease both}
.view.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

/* ---------- cards ---------- */
.card{
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:18px;margin-bottom:14px;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  box-shadow:0 10px 30px #00000055;
}
.card h3{
  font-family:var(--font-display);font-size:.82rem;font-weight:600;letter-spacing:.18em;
  text-transform:uppercase;color:var(--gold);margin-bottom:12px;
}
.card h3 small{color:var(--ink-dim);letter-spacing:.05em;font-family:var(--font-body);text-transform:none;font-weight:400}

/* ---------- owner (meu kin) ---------- */
.ownerBar{
  display:flex;align-items:center;gap:12px;border:1px solid var(--sealC,#e8b84b);
  border-radius:16px;padding:11px 14px;margin-bottom:14px;cursor:pointer;
  background:linear-gradient(135deg, color-mix(in srgb, var(--sealC,#e8b84b) 16%, transparent), #00000022);
  box-shadow:0 6px 20px #00000040;transition:transform .15s;
}
.ownerBar:hover{transform:translateY(-1px)}
.ownerBar .av{width:48px;height:48px;border-radius:13px;overflow:hidden;display:flex;align-items:center;justify-content:center;flex:0 0 auto;background:#00000030}
.ownerBar .av svg{width:48px;height:48px;display:block}
.ownerBar .oi{flex:1;min-width:0}
.ownerBar .oi b{font-family:var(--font-display);font-size:.98rem;display:block;line-height:1.25}
.ownerBar .oi span{font-size:.74rem;color:var(--ink-dim);display:block;line-height:1.4}
.ownerBar .go{font-size:.66rem;color:var(--sealC);white-space:nowrap;letter-spacing:.05em}
.setupCard{border:1px dashed var(--gold-dim);border-radius:16px;padding:16px;margin-bottom:14px;background:#e8b84b0c;text-align:center}
.setupCard h4{font-family:var(--font-display);font-size:.9rem;color:var(--gold);margin-bottom:6px}
.setupCard p{font-size:.8rem;color:var(--ink-dim);margin-bottom:12px;line-height:1.5}
.setupCard .pform{grid-template-columns:1fr 1fr;gap:8px}
.setupCard .pform .btn{grid-column:1/-1}
.badge.owner{color:var(--gold);border-color:#e8b84b88;background:#e8b84b1a;font-weight:600}
/* ---------- date bar ---------- */
.datebar{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.datebar input[type=date]{
  flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:12px;
  color:var(--ink);font-family:var(--font-body);font-size:1rem;padding:10px 12px;
  color-scheme:dark;min-width:0;
}
.btn{
  background:var(--panel2);border:1px solid var(--line);color:var(--ink);
  border-radius:12px;padding:10px 14px;font-family:var(--font-body);font-size:.92rem;
  cursor:pointer;transition:all .15s;white-space:nowrap;
}
.btn:hover{border-color:var(--gold-dim);color:var(--gold)}
.btn.gold{background:linear-gradient(135deg,#e8b84b22,#e8b84b0e);border-color:#e8b84b66;color:var(--gold);font-weight:600}
.jumps{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.jumps::-webkit-scrollbar{display:none}
.chip{
  flex:0 0 auto;background:transparent;border:1px solid var(--line);color:var(--ink-dim);
  border-radius:99px;padding:5px 12px;font-size:.8rem;cursor:pointer;transition:all .15s;font-family:var(--font-body);
}
.chip:hover{color:var(--gold);border-color:var(--gold-dim)}
.chip.today{color:var(--gold);border-color:#e8b84b88;font-weight:600}

/* ---------- hero kin ---------- */
.hero{position:relative;overflow:hidden;text-align:center;padding:26px 18px 22px}
.hero .halo{
  position:absolute;inset:-40% -20% auto;height:120%;pointer-events:none;
  background:radial-gradient(ellipse 60% 55% at 50% 30%, var(--sealGlow, #e8b84b22), transparent 70%);
}
.glyphRing{
  width:108px;height:108px;margin:0 auto 12px;border-radius:25px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 12px 34px color-mix(in srgb, var(--sealC,#e8b84b) 36%, transparent);
}
.glyphRing svg{width:108px;height:108px;display:block}
.kinNum{
  font-family:var(--font-display);font-size:.85rem;letter-spacing:.3em;color:var(--ink-dim);
  text-transform:uppercase;margin-bottom:4px;
}
.kinNum b{color:var(--gold);font-size:1.05rem;letter-spacing:.2em}
.kinName{font-family:var(--font-display);font-size:1.55rem;font-weight:700;line-height:1.2;color:var(--ink);margin-bottom:8px}
.kinSub{color:var(--ink-dim);font-size:.9rem;margin-bottom:12px}
.toneRow{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px}
.toneRow svg{color:var(--sealC,#e8b84b)}
.badges{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:10px}
.badge{
  font-size:.72rem;letter-spacing:.06em;border:1px solid var(--line);border-radius:99px;
  padding:4px 10px;color:var(--ink-dim);background:#00000030;
}
.badge.portal{color:#7fe0a8;border-color:#3f8f63;background:#123422aa;font-weight:600}
.badge.seal{color:var(--sealC);border-color:color-mix(in srgb, var(--sealC) 50%, transparent)}

/* ---------- oracle ---------- */
.oracle{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:auto auto auto;gap:8px;max-width:430px;margin:0 auto}
.ocell{
  border:1px solid var(--line);border-radius:14px;padding:10px 6px;text-align:center;cursor:pointer;
  background:#00000028;transition:transform .15s, border-color .15s;
}
.ocell:hover{transform:translateY(-2px);border-color:var(--gold-dim)}
.ocell svg{width:34px;height:34px;display:block;margin:0 auto 4px}
.ocell .role{font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:2px}
.ocell .oname{font-size:.72rem;line-height:1.25;color:var(--ink)}
.ocell .okin{font-size:.66rem;color:var(--ink-dim);margin-top:2px}
.ocell.center{border-width:2px;background:#00000045}
.o-g{grid-column:2;grid-row:1}.o-ant{grid-column:1;grid-row:2}.o-c{grid-column:2;grid-row:2}.o-ana{grid-column:3;grid-row:2}.o-oc{grid-column:2;grid-row:3}

/* ---------- affirmation ---------- */
.affirm{font-style:italic;font-size:1.02rem;line-height:1.75;text-align:center;color:#efe9dc}
.affirm .inlakech{display:block;margin-top:10px;font-family:var(--font-display);font-style:normal;font-size:.75rem;letter-spacing:.25em;color:var(--gold-dim)}

/* ---------- wave strip ---------- */
.waveStrip{display:grid;grid-template-columns:repeat(13,1fr);gap:4px}
.waveStrip .w{
  aspect-ratio:1;border-radius:8px;display:flex;align-items:center;justify-content:center;
  font-size:.68rem;color:#0b0e1a;font-weight:700;cursor:pointer;opacity:.55;transition:all .15s;
}
.waveStrip .w:hover{opacity:.9}
.waveStrip .w.cur{opacity:1;outline:2px solid var(--gold);outline-offset:2px}

/* ---------- info grid ---------- */
.igrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}
.ibox{border:1px solid var(--line);border-radius:12px;padding:10px 12px;background:#00000025}
.ibox .k{font-size:.66rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:3px}
.ibox .v{font-size:.9rem;font-weight:600;line-height:1.3}
.ibox .v small{font-weight:400;color:var(--ink-dim)}

/* ---------- tzolkin ---------- */
.tzWrap{overflow-x:auto;padding-bottom:6px}
.tz{display:grid;grid-template-rows:repeat(20,1fr);grid-auto-flow:column;gap:3px;min-width:560px}
.tz .c{
  width:100%;min-width:38px;aspect-ratio:1;border-radius:7px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;font-size:.62rem;font-weight:700;
  color:#0b0e1acc;position:relative;transition:transform .12s;
}
.tz .c:hover{transform:scale(1.12);z-index:2}
.tz .c.gap::after{content:"";position:absolute;inset:2px;border:1.5px solid #0b0e1a88;border-radius:5px}
.tz .c.now{outline:2.5px solid #fff;outline-offset:1.5px;z-index:1}
.tz .c.mystic{box-shadow:inset 0 0 0 100px #ffffff2e}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px;font-size:.75rem;color:var(--ink-dim)}
.legend i{display:inline-block;width:12px;height:12px;border-radius:4px;margin-right:5px;vertical-align:-1px}

/* ---------- wave view ---------- */
.waveList{display:flex;flex-direction:column;gap:6px}
.wrow{
  display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:12px;
  padding:8px 12px;background:#00000025;cursor:pointer;transition:border-color .15s;
}
.wrow:hover{border-color:var(--gold-dim)}
.wrow.cur{border-color:var(--gold);background:#e8b84b14}
.wrow .pos{font-family:var(--font-display);width:26px;text-align:center;color:var(--gold);font-weight:700}
.wrow svg{width:26px;height:26px;flex:0 0 auto}
.wrow .nm{flex:1;font-size:.88rem;line-height:1.3}
.wrow .nm small{display:block;color:var(--ink-dim);font-size:.72rem}
.wrow .kn{font-size:.7rem;color:var(--ink-dim)}

/* ---------- moons ---------- */
.moonList{display:flex;flex-direction:column;gap:6px}
.mrow{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:12px;padding:8px 12px;background:#00000025}
.mrow.cur{border-color:var(--gold);background:#e8b84b12}
.mrow .n{font-family:var(--font-display);width:24px;text-align:center;color:var(--gold)}
.mrow .info{flex:1;font-size:.86rem}.mrow .info small{display:block;color:var(--ink-dim);font-size:.72rem}
.mrow .dt{font-size:.72rem;color:var(--ink-dim)}
.moonGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-top:10px}
.moonGrid .h{font-size:.6rem;letter-spacing:.08em;color:var(--ink-dim);text-align:center;padding:4px 0;text-transform:uppercase}
.moonGrid .d{
  aspect-ratio:1;border:1px solid var(--line);border-radius:8px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1px;cursor:pointer;background:#00000025;transition:border-color .15s;
}
.moonGrid .d:hover{border-color:var(--gold-dim)}
.moonGrid .d.now{border-color:var(--gold);box-shadow:0 0 12px #e8b84b44;background:#e8b84b14}
.moonGrid .d .dm{font-size:.78rem;font-weight:700}
.moonGrid .d .gg{font-size:.56rem;color:var(--ink-dim)}
.moonGrid .d i{width:8px;height:8px;border-radius:3px;display:block}

/* ---------- profiles ---------- */
.pform{display:grid;grid-template-columns:1fr 1fr auto;gap:8px}
.pform input{
  background:var(--panel2);border:1px solid var(--line);border-radius:12px;color:var(--ink);
  font-family:var(--font-body);font-size:.95rem;padding:10px 12px;color-scheme:dark;min-width:0;
}
.plist{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.prow{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:14px;padding:10px 12px;background:#00000025}
.prow .sel{width:20px;height:20px;accent-color:var(--gold);cursor:pointer}
.prow .av{
  width:46px;height:46px;border-radius:12px;display:flex;overflow:hidden;
  align-items:center;justify-content:center;flex:0 0 auto;cursor:pointer;background:#00000030;
}
.prow .av svg{width:46px;height:46px;display:block}
.prow .pi{flex:1;cursor:pointer;min-width:0}
.prow .pi b{display:block;font-size:.95rem}
.prow .pi span{font-size:.75rem;color:var(--ink-dim);display:block;line-height:1.35}
.prow .del{background:none;border:none;color:#77618a;font-size:1.1rem;cursor:pointer;padding:6px}
.prow .del:hover{color:var(--red)}
.prow.ownd{border-color:var(--gold);background:#e8b84b10}
.relbar{margin-top:12px;display:flex;justify-content:center}
.hint{font-size:.78rem;color:var(--ink-dim);text-align:center;margin-top:10px;line-height:1.5}

/* ---------- kins (diretório) ---------- */
.searchInput{
  width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:12px;
  color:var(--ink);font-family:var(--font-body);font-size:1rem;padding:11px 14px;margin-bottom:12px;
}
.searchInput::placeholder{color:#5f6a8f}
.kinDir{display:flex;flex-direction:column;gap:4px;max-height:62vh;overflow-y:auto;padding-right:4px}
.krow{
  display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:10px;
  padding:6px 10px;background:#00000022;cursor:pointer;transition:border-color .15s;
}
.krow:hover{border-color:var(--gold-dim)}
.krow svg{width:22px;height:22px;flex:0 0 auto}
.krow b{font-size:.78rem;color:var(--ink-dim);width:58px;flex:0 0 auto;font-weight:600}
.krow .nm{font-size:.86rem;flex:1}
.krow .st{color:#7fe0a8;font-size:.8rem}
/* ---------- castelos / estações ---------- */
.castle{border:1px solid var(--line);border-radius:14px;padding:12px;margin-bottom:10px;background:#00000022}
.castle.cur{border-color:var(--gold)}
.castle h4{font-family:var(--font-display);font-size:.78rem;letter-spacing:.1em;margin-bottom:2px}
.castle .sub{font-size:.7rem;color:var(--ink-dim);margin-bottom:8px}
.castle .waveStrip{margin-bottom:5px}
.castle .waveStrip .w{border-radius:5px;font-size:.58rem}
.seasonRow{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:12px;padding:9px 12px;background:#00000022;margin-bottom:6px}
.seasonRow.cur{border-color:var(--gold);background:#e8b84b12}
.seasonRow i{width:14px;height:14px;border-radius:5px;flex:0 0 auto}
.seasonRow .nm{flex:1;font-size:.86rem}.seasonRow .nm small{display:block;color:var(--ink-dim);font-size:.7rem}
.seasonRow .rg{font-size:.7rem;color:var(--ink-dim)}
/* ---------- caminho do destino ---------- */
.pathGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(74px,1fr));gap:5px;max-height:46vh;overflow-y:auto;padding-right:4px}
.age{
  border:1px solid var(--line);border-radius:9px;padding:5px 4px;text-align:center;cursor:pointer;
  background:#00000025;transition:border-color .15s;
}
.age:hover{border-color:var(--gold-dim)}
.age.cur{border-color:var(--gold);background:#e8b84b14;box-shadow:0 0 10px #e8b84b33}
.age .a{font-size:.6rem;color:var(--ink-dim);letter-spacing:.04em}
.age .k{font-size:.72rem;font-weight:700;margin-top:1px}
/* ---------- modal ---------- */
.overlay{
  position:fixed;inset:0;z-index:60;background:#05070fd9;backdrop-filter:blur(6px);
  display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:24px 12px 40px;
}
.overlay.open{display:flex}
.sheet{width:100%;max-width:560px;animation:fadeUp .3s ease both}
.sheet .close{
  position:sticky;top:0;margin-left:auto;display:block;background:#1b2440;border:1px solid var(--line);
  color:var(--ink);border-radius:99px;width:38px;height:38px;font-size:1.05rem;cursor:pointer;margin-bottom:10px;z-index:2;
}

/* ---------- nav ---------- */
nav.tabs{
  position:fixed;left:0;right:0;bottom:0;z-index:40;
  display:flex;justify-content:space-around;
  background:linear-gradient(180deg,#0d1122ee,#0b0e1af8);
  border-top:1px solid #232c4a;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  padding:8px 4px calc(8px + env(safe-area-inset-bottom));
}
nav.tabs button{
  background:none;border:none;color:var(--ink-dim);font-family:var(--font-body);
  font-size:.64rem;letter-spacing:.05em;cursor:pointer;display:flex;flex-direction:column;
  align-items:center;gap:3px;padding:4px 10px;border-radius:12px;transition:color .15s;
}
nav.tabs button svg{width:20px;height:20px}
nav.tabs button.on{color:var(--gold)}
@media(max-width:400px){nav.tabs button{padding:4px 6px;font-size:.6rem}}
@media(min-width:760px){
  nav.tabs{position:sticky;top:58px;bottom:auto;justify-content:center;gap:14px;border-top:none;border-bottom:1px solid #232c4a}
  nav.tabs button{flex-direction:row;font-size:.8rem;gap:7px}
  body{padding-bottom:40px}
}
.two{display:grid;gap:14px}
@media(min-width:760px){.two{grid-template-columns:1fr 1fr}}
footer.app{max-width:980px;margin:10px auto 0;padding:0 16px 20px;font-size:.7rem;color:#5a6488;text-align:center;line-height:1.6}
</style>
</head>
<body>

<header class="app">
  <h1>Sincronário 13:20</h1>
  <div class="greg" id="hdrDate"></div>
</header>

<nav class="tabs" id="tabs">
  <button data-tab="hoje" class="on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="4.4"/><path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5.2 5.2l2.1 2.1M16.7 16.7l2.1 2.1M18.8 5.2l-2.1 2.1M7.3 16.7l-2.1 2.1"/></svg>Hoje</button>
  <button data-tab="tzolkin"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg>Tzolkin</button>

/* ================= MATEMÁTICA ================= */
const MS=86400000;
const utc=(y,m,d)=>Date.UTC(y,m-1,d);
function leapsUpTo(y,m,d){const yy=(m>2||(m===2&&d>=29))?y:y-1;return Math.floor(yy/4)-Math.floor(yy/100)+Math.floor(yy/400);}
const ANCHOR=utc(2013,7,26), ANCHOR_KIN=164, ANCHOR_LEAPS=leapsUpTo(2013,7,26);
function kinFor(y,m,d){
  if(m===2&&d===29) return 0; /* 0.0 Hunab Ku */
  const days=Math.round((utc(y,m,d)-ANCHOR)/MS)-(leapsUpTo(y,m,d)-ANCHOR_LEAPS);
  return ((ANCHOR_KIN-1+days)%260+260)%260+1;
}
const sealOf=k=>(k-1)%20+1, toneOf=k=>(k-1)%13+1;
const colorOf=k=>(sealOf(k)-1)%4;
function kinFromST(s,t){for(let k=1;k<=260;k++){if(sealOf(k)===s&&toneOf(k)===t)return k}return 1}
function kinName(k){
  const s=SEALS[sealOf(k)-1],t=TONES[toneOf(k)-1],c=COLORS[colorOf(k)];
  return s.name+" "+(s.g?t.fem:t.name)+" "+(s.g?c.fem:c.n);
}
function oracleOf(k){
  const s=sealOf(k),t=toneOf(k);
  const off=[0,12,4,16,8][(t-1)%5];
  const gs=(s-1+off)%20+1;
  let as_=19-s; if(as_<=0)as_+=20;
  const ans=(s-1+10)%20+1;
  return {
    guide:kinFromST(gs,t), analog:kinFromST(as_,t),
    antipode:kinFromST(ans,t), occult:kinFromST(21-s,14-t),
    selfGuided:gs===s
  };
}
function waveOf(k){let st=k-(toneOf(k)-1); if(st<1)st+=260; return Array.from({length:13},(_,i)=>st+i);}
function castleOf(k){return CASTLES[Math.floor((k-1)/52)];}
function familyOf(k){return "Família "+FAMILIES[sealOf(k)%5];}
function clanOf(k){const s=sealOf(k);return CLANS[s===20?0:s<=4?0:s<=9?1:s<=14?2:3];}
function affirmationOf(k){
  const s=SEALS[sealOf(k)-1],t=TONES[toneOf(k)-1],o=oracleOf(k);
  const cell=CELLS[Math.ceil(sealOf(k)/4)-1];
  const guide=o.selfGuided?"pelo meu próprio poder duplicado":"pelo poder "+SEALS[sealOf(o.guide)-1].powerDe;
  return ["Eu "+t.verb+" com o fim de "+s.act,
          t.ger+" "+s.essObj,
          "Eu selo "+cell+" "+s.powerDe,
          "Com o tom "+t.name+" "+t.powerDe,
          "Eu sou guiado "+guide];
}
/* 13 luas */
function moonInfo(y,m,d){
  const sy=(m>7||(m===7&&d>=26))?y:y-1;
  const yearKin=kinFor(sy,7,26);
  if(m===7&&d===25) return {special:"Dia Fora do Tempo",sy,yearKin,doy:364};
  if(m===2&&d===29) return {special:"0.0 Hunab Ku",sy,yearKin,doy:null};
  const doy=Math.round((utc(y,m,d)-utc(sy,7,26))/MS)-(leapsUpTo(y,m,d)-leapsUpTo(sy,7,26));
  return {moon:Math.floor(doy/28)+1, day:doy%28+1, sy, yearKin, doy};
}
function psiOf(mi){return (mi.moon&&mi.day)?PSI[mi.moon-1][mi.day-1]:null;}
function seasonOf(k){return SEASONS[Math.ceil(k/65)-1];}
function harmonicOf(k){const h=Math.ceil(k/4);return {h,cell:CELLS[(h-1)%5],pos:colorOf(k)+1};}
function chromaticOf(mi){
  if(mi.doy==null) return null;
  const start=((mi.yearKin-1+(mi.doy-mi.doy%5))%260)+1;
  const c=colorOf(start);
  return {i:Math.floor(mi.doy/5)+1, pos:mi.doy%5+1, name:"Cromática "+COLORS[c].fem+" "+CHROM_CLAN[c], hex:COLORS[c].hex};
}
function moonStartDate(sy,idx){ /* idx 0-12 */
  const [mm,dd]=MOON_STARTS[idx]; const yy=(mm>=7)?sy:sy+1; return {y:yy,m:mm,d:dd};
}
function addDays(o,n){const t=new Date(utc(o.y,o.m,o.d)+n*MS);return {y:t.getUTCFullYear(),m:t.getUTCMonth()+1,d:t.getUTCDate()};}
function nextDateOfKin(kin,from){
  let o={...from};
  for(let i=0;i<800;i++){ if(kinFor(o.y,o.m,o.d)===kin) return o; o=addDays(o,1); }
  return null;
}
function todayYMD(){const n=new Date();return {y:n.getFullYear(),m:n.getMonth()+1,d:n.getDate()};}
const sameYMD=(a,b)=>a.y===b.y&&a.m===b.m&&a.d===b.d;
function fmtDate(o,withWeek){
  const w=WEEKDAYS[new Date(utc(o.y,o.m,o.d)).getUTCDay()];
  const base=o.d+" de "+MONTHS_PT[o.m-1]+" de "+o.y;
  return withWeek?(w+", "+base):base;
}
const pad=n=>String(n).padStart(2,"0");

  inner+=(g.f||[]).map(f=>'<circle cx="'+f[0]+'" cy="'+f[1]+'" r="'+(f[2]+0.4)+'" fill="'+SEAL_INK+'"/>').join("");
  return '<svg viewBox="0 0 48 48">'+inner+'</svg>';
}
function toneSVG(t,color){
  const bars=Math.floor(t/5), dots=t%5, w=64;
  let s='<svg viewBox="0 0 '+w+' 26" width="'+(w*0.9)+'" height="24" fill="'+color+'" stroke="none">';
  const dw=dots*12-4, dx0=(w-(dots?dw:0))/2;
  for(let i=0;i<dots;i++) s+='<circle cx="'+(dx0+4+i*12)+'" cy="6" r="3.6"/>';
  for(let b=0;b<bars;b++) s+='<rect x="'+((w-44)/2)+'" y="'+(13+b*7)+'" width="44" height="4.6" rx="2.3"/>';
  return s+"</svg>";
}

    const nx=k?nextDateOfKin(k,todayYMD()):null;
    const mine=isOwner(p);
    let rel="";
    if(owKin&&k&&!mine){const rk=transitKin(owKin,k);
      rel='<span style="color:#c9b06a">Kin do relacionamento com você: Kin '+rk+' · '+esc(kinName(rk))+'</span>';}
    return '<div class="prow'+(mine?" ownd":"")+'" style="--sealC:'+c+'">'+
      '<input type="checkbox" class="sel" data-id="'+p.id+'">'+
      '<span class="av" data-pid="'+p.id+'">'+(k?glyphSVG(k):"✳")+'</span>'+
      '<span class="pi" data-pid="'+p.id+'"><b>'+esc(p.name)+(mine?' <span style="color:var(--gold)">★ meu kin</span>':"")+'</b>'+
      '<span>'+pad(p.d)+"/"+pad(p.m)+"/"+p.y+(k?" · Kin "+k+" · "+esc(kinName(k)):" · 0.0 Hunab Ku")+'</span>'+
      rel+
      (nx?'<span>Próximo aniversário galáctico (o kin volta a cada 260 dias): '+esc(fmtDate(nx))+'</span>':"")+
      '</span>'+
      (mine?"":'<button class="del" data-makeowner="'+p.id+'" title="tornar meu kin" style="color:#b79a52;font-size:1rem">☆</button>')+
      '<button class="del" data-del="'+p.id+'" title="remover">🗑</button></div>';
  }).join("");
  $("view-perfis").innerHTML=
   (ow?"":'<div class="setupCard"><h4>✦ Defina o seu Kin</h4><p>Marque quem é você (☆ ao lado do nome) ou cadastre-se abaixo. Assim o app mostra seu trânsito diário na tela Hoje e a relação de cada pessoa com você.</p></div>')+
   '<div class="card"><h3>'+(ow?"Calcular Kin de Outra Pessoa":"Calcular Kin de Nascimento")+'</h3>'+
   '<div class="pform"><input id="pName" placeholder="Nome" maxlength="30">'+
   '<input id="pDate" type="date"><button class="btn gold" id="pAdd">Calcular e salvar</button></div>'+
   '<p class="hint">O kin fica salvo neste aparelho. Toque no nome para ver o painel completo (com trânsito e castelo de 13 anos).</p></div>'+
   (ps.length?'<div class="card"><h3>Meus Kins</h3><div class="plist">'+rows+'</div>'+
     '<div class="relbar"><button class="btn gold" id="relBtn">♥ Kin da Relação entre 2 pessoas (marque 2)</button></div>'+
     '<p class="hint">☆ define quem é você · a relação com você já aparece em cada pessoa. O botão calcula a relação entre duas pessoas quaisquer.'+
     (ow?' <button class="btn" id="ownForget" style="margin-top:8px">Trocar/esquecer meu kin</button>':"")+'</p></div>':"");
  $("pAdd").addEventListener("click",()=>{
    const nm=$("pName").value.trim(), dt=$("pDate").value;
    if(!nm||!dt){alert("Preencha nome e data de nascimento.");return;}
    const o=fromInput(dt), ps2=loadProfiles();
    ps2.push({id:Date.now()+""+Math.floor(Math.random()*999),name:nm,...o});
    saveProfiles(ps2); renderPerfis();
    const k=kinFor(o.y,o.m,o.d); if(k)openKinModal(k,"Nascimento: "+fmtDate(o),o);
  });
  const rb=$("relBtn");
  if(rb) rb.addEventListener("click",()=>{
    const sel=[...document.querySelectorAll(".prow .sel:checked")].map(x=>x.dataset.id);
    if(sel.length!==2){alert("Marque exatamente 2 pessoas.");return;}
    const all=loadProfiles(), a=all.find(p=>p.id===sel[0]), b=all.find(p=>p.id===sel[1]);
    const ka=kinFor(a.y,a.m,a.d), kb=kinFor(b.y,b.m,b.d);
    if(!ka||!kb){alert("Uma das datas é 29/02 (Hunab Ku), sem kin.");return;}
    let kr=(ka+kb)%260; if(kr===0)kr=260;
    openKinModal(kr,"Kin da Relação: "+esc(a.name)+" (Kin "+ka+") + "+esc(b.name)+" (Kin "+kb+")");
  });
}

/* ================= MODAL ================= */
function transitKin(a,b){const t=(a+b)%260;return t===0?260:t;}
function birthdayIn(birth,age){
  const by=birth.y+age;
  if(birth.m===2&&birth.d===29){const L=(by%4===0&&by%100!==0)||by%400===0;if(!L)return {y:by,m:2,d:28};}
  return {y:by,m:birth.m,d:birth.d};
}
function ageNow(birth){
  const t=todayYMD();
  let a=t.y-birth.y-((t.m<birth.m||(t.m===birth.m&&t.d<birth.d))?1:0);
  return a<0?0:a;
}
function transitCardHTML(natal){
  const t=todayYMD(), dk=kinFor(t.y,t.m,t.d);
  if(!dk) return "";
  const tk=transitKin(natal,dk), c=COLORS[colorOf(tk)];
  return '<div class="card"><h3>Kin de Trânsito de Hoje <small>· kin natal + kin do dia</small></h3><div class="igrid">'+
   '<div class="ibox"><div class="k">Fórmula</div><div class="v">Kin '+natal+' (natal) + Kin '+dk+' (hoje)</div></div>'+
   '<div class="ibox" data-kin="'+tk+'" style="cursor:pointer;border-color:'+c.hex+'66"><div class="k">Trânsito</div><div class="v"><span style="color:'+c.hex+'">Kin '+tk+' · '+esc(kinName(tk))+'</span><br><small>a energia que o dia acende no seu kin · toque para abrir</small></div></div>'+
   '</div></div>';
}
function destinyPathHTML(birth){
  const curAge=ageNow(birth);
  const bdNow=birthdayIn(birth,curAge);
  const annual=kinFor(bdNow.y,bdNow.m,bdNow.d);
  const ci=Math.floor(curAge/13), pos=curAge%13+1, cc=COLORS[ci%4];
  let h='<div class="card"><h3>Castelo do Destino <small>· ondas de 13 anos · volta ao kin natal aos 52</small></h3>';
  if(annual) h+='<div class="ibox" style="margin-bottom:6px"><div class="k">Ano em curso (kin anual de trânsito)</div><div class="v">'+curAge+' anos · Kin '+annual+' · '+esc(kinName(annual))+'<br><small>Onda do destino '+(ci+1)+' · <span style="color:'+cc.hex+'">corte '+esc(cc.fem.toLowerCase())+'</span> · ano '+pos+' de 13 · tom '+esc(TONES[pos-1].name)+" "+esc(TONES[pos-1].powerDe)+'</small></div></div>';
  for(let c=0;c<8;c++){
    const col=COLORS[c%4];
    h+='<div style="margin:12px 0 6px;font-size:.68rem;letter-spacing:.1em;text-transform:uppercase;color:'+col.hex+'">Onda '+(c+1)+' · '+(c*13)+' a '+(c*13+12)+' anos · '+(c<4?"1º":"2º")+' castelo</div><div class="pathGrid">';
    for(let i=0;i<13;i++){
      const age=c*13+i, bd=birthdayIn(birth,age), kk=kinFor(bd.y,bd.m,bd.d);
      if(!kk)continue;
      h+='<div class="age'+(age===curAge?" cur":"")+'" data-kin="'+kk+'" style="border-color:'+COLORS[colorOf(kk)].hex+'44">'+
        '<div class="a">'+age+' anos · tom '+(i+1)+'</div><div class="k" style="color:'+COLORS[colorOf(kk)].hex+'">Kin '+kk+'</div></div>';
    }
    h+='</div>';
  }
  return h+'<p class="hint">Cada onda de 13 anos leva do tom Magnético (propósito) ao Cósmico (presença); aos 52 anos fecha o castelo e o kin natal retorna. O ano atual está em dourado; toque num ano para abrir o kin dele.</p></div>';
}
function openKinModal(k,ctx,birth){
  const nx=nextDateOfKin(k,todayYMD());
  $("modalBody").innerHTML=kinPanelHTML(k,ctx||"")+
    (birth?transitCardHTML(k)+destinyPathHTML(birth):"")+
    (nx?'<div class="card"><h3>Próxima ocorrência</h3><p style="font-size:.92rem">'+esc(fmtDate(nx,true))+
    ' <button class="btn" style="margin-left:8px" data-goto="'+toInput(nx)+'">Abrir na aba Hoje</button></p></div>':"");
  $("overlay").classList.add("open");
  $("overlay").scrollTop=0;
}
function closeModal(){$("overlay").classList.remove("open");}

/* ================= NAVEGAÇÃO ================= */
function renderAll(){
  $("hdrDate").innerHTML=fmtDate(shownDate,true).replace(", ","<br>");
  ({hoje:renderHoje,tzolkin:renderTzolkin,ciclos:renderCiclos,luas:renderLuas,kins:renderKins,perfis:renderPerfis})[curTab]();
}
function switchTab(tab){
  curTab=tab;
  document.querySelectorAll("nav.tabs button").forEach(b=>b.classList.toggle("on",b.dataset.tab===tab));
  document.querySelectorAll(".view").forEach(v=>v.classList.toggle("active",v.id==="view-"+tab));
  renderAll();
  window.scrollTo({top:0});
}
$("tabs").addEventListener("click",e=>{const b=e.target.closest("button");if(b)switchTab(b.dataset.tab);});
document.addEventListener("click",e=>{
  const nav=e.target.closest("[data-nav]");
  if(nav){shownDate=addDays(shownDate,Number(nav.dataset.nav));renderAll();return;}
  const jp=e.target.closest("[data-jump]");
  if(jp){shownDate=jp.dataset.jump==="hoje"?todayYMD():addDays(shownDate,Number(jp.dataset.jump));renderAll();return;}
  const gt=e.target.closest("[data-goto]");
  if(gt){shownDate=fromInput(gt.dataset.goto);closeModal();switchTab("hoje");return;}
  const dd=e.target.closest(".moonGrid .d[data-date]");
  if(dd){shownDate=fromInput(dd.dataset.date);switchTab("hoje");return;}
  const ob=e.target.closest("[data-owner]");
  if(ob){const ow=loadOwner();if(ow){const k=kinFor(ow.y,ow.m,ow.d);
    if(k)openKinModal(k,ow.name+" · meu kin · "+fmtDate({y:ow.y,m:ow.m,d:ow.d}),{y:ow.y,m:ow.m,d:ow.d});}
    return;}
  const mk=e.target.closest("[data-makeowner]");
  if(mk){const p=loadProfiles().find(x=>x.id===mk.dataset.makeowner);
    if(p){saveOwner({name:p.name,y:p.y,m:p.m,d:p.d});renderPerfis();}return;}
  const del=e.target.closest("[data-del]");
  if(del){saveProfiles(loadProfiles().filter(p=>p.id!==del.dataset.del));renderPerfis();return;}
  const pp=e.target.closest("[data-pid]");
  if(pp){const p=loadProfiles().find(x=>x.id===pp.dataset.pid);
    if(p){const k=kinFor(p.y,p.m,p.d);
      if(k)openKinModal(k,p.name+" · nascimento: "+fmtDate({y:p.y,m:p.m,d:p.d}),{y:p.y,m:p.m,d:p.d});}
    return;}
  const kc=e.target.closest("[data-kin]");
  if(kc){openKinModal(Number(kc.dataset.kin));return;}
});
$("closeModal").addEventListener("click",closeModal);
$("overlay").addEventListener("click",e=>{if(e.target===e.currentTarget)closeModal();});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});

renderAll();
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
</script>
</body>
